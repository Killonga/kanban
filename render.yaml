# Render Blueprint Specification
services:
  - type: web
    name: kanbanpro-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kanbanpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generará una clave aleatoria segura automáticamente
      - key: NODE_ENV
        value: production

databases:
  - name: kanbanpro-db
    plan: free